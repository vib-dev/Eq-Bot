name: Market Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: market-monitor-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot cycle
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          BOT_TIMEZONE: Asia/Kolkata
          DB_PATH: data/bot.db
          POLL_INTERVAL_MINUTES: 5
          ENABLE_REUTERS: "true"
          ENABLE_MONEYCONTROL: "true"
          ENABLE_BSE: "true"
          ENABLE_SCANX: "false"
          DEFAULT_MARKET_CAP_THRESHOLD_CRORE: "1000"
          MAX_UPDATES_PER_CYCLE: "20"
          HTTP_TIMEOUT_SECONDS: "20"
        run: python -m bot.github_runner

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if ! git diff --cached --quiet; then
            git commit -m "Update bot state"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
